# .github/workflows/cicd.yml
# 
# 단계별 발전 이력:
#   SSH + Private Key (JAR 직접 배포)
#   Docker Hub + docker run (컨테이너화)
#   OIDC + SSM Send-Command (키 없는 인증)
#   OIDC + ECR + ECS (현재, 서버리스 컨테이너)

name: CI/CD — ECR + ECS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  ECS_CLUSTER:    ${{ vars.ECS_CLUSTER }}
  ECS_SERVICE:    ${{ vars.ECS_SERVICE }}
  CONTAINER_NAME: ${{ vars.CONTAINER_NAME }}
  TASK_DEFINITION: cicd-basic-lab/.aws/task-definition.json

jobs:

  ci:
    name: CI — Build & Push to ECR
    runs-on: ubuntu-latest

    outputs:
      image-repo-tag: ${{ steps.build-push.outputs.image-repo-tag }}
      image-tag:      ${{ steps.build-push.outputs.image-tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        working-directory: cicd-basic-lab
        run: mvn clean package -DskipTests -B

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-cicd-basic-lab-role
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-CI-${{ github.run_id }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag and push image to ECR
        working-directory: cicd-basic-lab
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          TAG="${{ github.run_number }}-${SHORT_SHA}"
          IMAGE_URI="${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:${TAG}"

          echo "빌드 이미지: ${IMAGE_URI}"

          docker build \
            --build-arg BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --build-arg GIT_SHA="${SHORT_SHA}" \
            -t ${IMAGE_URI} .

          docker push ${IMAGE_URI}

          echo "IMAGE_TAG=${TAG}" >> $GITHUB_ENV

      # .과 / 포함 값은 Job outputs 전달 불가
      # image-repo-tag (mylab-backend:35-a1a2d96) 만 전달
      # cd Job에서 ECR registry 주소를 조합하여 완성
      - name: Export image outputs
        id: build-push
        run: |
          REPO_TAG="${{ env.ECR_REPOSITORY }}:${IMAGE_TAG}"
          echo "image-repo-tag=${REPO_TAG}" >> $GITHUB_OUTPUT
          echo "image-tag=${IMAGE_TAG}"     >> $GITHUB_OUTPUT
          echo "확인 - image-repo-tag: ${REPO_TAG}"


  cd:
    name: CD — Deploy to ECS
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-cicd-basic-lab-role
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-CD-${{ github.run_id }}

      - name: Inject Account ID into task definition
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          TASK_DEF_PATH=$(find $GITHUB_WORKSPACE -name "task-definition.json" | head -1)
          echo "찾은 경로: ${TASK_DEF_PATH}"
          sed -i "s/ACCOUNT_ID/${ACCOUNT_ID}/g" ${TASK_DEF_PATH}
          echo "Task Definition ACCOUNT_ID 치환 완료: ${ACCOUNT_ID}"

      # ECR registry 주소 + image-repo-tag 조합으로 전체 URI 완성
      - name: Render new task definition with updated image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.TASK_DEFINITION }}
          container-name:  ${{ env.CONTAINER_NAME }}
          image:           ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ needs.ci.outputs.image-repo-tag }}

      - name: Deploy to ECS (Rolling Update)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service:  ${{ env.ECS_SERVICE }}
          cluster:  ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Print deployment result
        run: |
          echo "=============================="
          echo " 배포 완료"
          echo " 이미지: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ needs.ci.outputs.image-repo-tag }}"
          echo " 클러스터: ${{ env.ECS_CLUSTER }}"
          echo " 서비스: ${{ env.ECS_SERVICE }}"
          echo "=============================="
