# .github/workflows/cicd.yml
# 
# 단계별 발전 이력:
#   SSH + Private Key (JAR 직접 배포)
#   Docker Hub + docker run (컨테이너화)
#   OIDC + SSM Send-Command (키 없는 인증)
#   OIDC + ECR + ECS (현재, 서버리스 컨테이너)

name: CI/CD — ECR + ECS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

defaults:
  run:
    working-directory: cicd-basic-lab    # run: 명령어 기본 경로 (uses: 에는 미적용)

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}    # mylab-backend
  ECS_CLUSTER:    ${{ vars.ECS_CLUSTER }}        # mylab-cluster
  ECS_SERVICE:    ${{ vars.ECS_SERVICE }}        # mylab-backend-service
  CONTAINER_NAME: ${{ vars.CONTAINER_NAME }}     # mylab-backend
  TASK_DEFINITION: cicd-basic-lab/.aws/task-definition.json    # 수정

jobs:

  ci:
    name: CI — Build & Push to ECR
    runs-on: ubuntu-latest

    outputs:
      image-uri: ${{ steps.build-push.outputs.image-uri }}
      image-tag: ${{ steps.build-push.outputs.image-tag }}

    steps:
      # 1. 코드 체크아웃
      - name: Checkout
        uses: actions/checkout@v4

      # 2. JDK 설정
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # 3. Maven 빌드
      - name: Build with Maven
        run: mvn clean package -DskipTests -B    # working-directory: cicd-basic-lab 적용

      # 4. OIDC 인증
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-cicd-basic-lab-role
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-CI-${{ github.run_id }}

      # 5. ECR 로그인
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 6. Docker 빌드 + ECR Push
      - name: Build, tag and push image to ECR
        id: build-push
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |                                      # working-directory: cicd-basic-lab 적용
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          TAG="${{ github.run_number }}-${SHORT_SHA}"
          IMAGE_URI="${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:${TAG}"

          echo "빌드 이미지: ${IMAGE_URI}"

          docker build \
            --build-arg BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --build-arg GIT_SHA="${SHORT_SHA}" \
            -t ${IMAGE_URI} .

          docker push ${IMAGE_URI}

          echo "image-uri=${IMAGE_URI}" >> $GITHUB_OUTPUT
          echo "image-tag=${TAG}"       >> $GITHUB_OUTPUT


  cd:
    name: CD — Deploy to ECS
    runs-on: ubuntu-latest
    needs: ci

    steps:
      # 1. 코드 체크아웃 (task-definition.json 접근 필요)
      - name: Checkout
        uses: actions/checkout@v4

      # 2. OIDC 인증
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-cicd-basic-lab-role
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-CD-${{ github.run_id }}

      # 3. Task Definition ACCOUNT_ID 치환
      #    uses: 가 아닌 run: 이므로 working-directory 적용됨
      #    단, TASK_DEFINITION은 git 루트 기준 경로이므로 $GITHUB_WORKSPACE 사용
      - name: Inject Account ID into task definition
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          sed -i "s/ACCOUNT_ID/${ACCOUNT_ID}/g" $GITHUB_WORKSPACE/cicd-basic-lab/.aws/task-definition.json
          echo "Task Definition ACCOUNT_ID 치환 완료: ${ACCOUNT_ID}"

      # 4. Task Definition 이미지 URI 교체
      #    uses: 이므로 working-directory 미적용 → git 루트 기준 경로 사용
      - name: Render new task definition with updated image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.TASK_DEFINITION }}    # git 루트 기준
          container-name:  ${{ env.CONTAINER_NAME }}
          image:           ${{ needs.ci.outputs.image-uri }}

      # 5. ECS Rolling Update 배포
      - name: Deploy to ECS (Rolling Update)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service:  ${{ env.ECS_SERVICE }}
          cluster:  ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      # 6. 배포 결과 출력
      - name: Print deployment result
        run: |
          echo "=============================="
          echo " 배포 완료"
          echo " 이미지: ${{ needs.ci.outputs.image-uri }}"
          echo " 클러스터: ${{ env.ECS_CLUSTER }}"
          echo " 서비스: ${{ env.ECS_SERVICE }}"
          echo "=============================="
