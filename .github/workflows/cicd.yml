# .github/workflows/cicd.yml
# 
# 단계별 발전 이력:
#   SSH + Private Key (JAR 직접 배포)
#   Docker Hub + docker run (컨테이너화)
#   OIDC + SSM Send-Command (키 없는 인증)
#   OIDC + ECR + ECS (현재, 서버리스 컨테이너)

name: CI/CD — ECR + ECS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  ECS_CLUSTER:    ${{ vars.ECS_CLUSTER }}
  ECS_SERVICE:    ${{ vars.ECS_SERVICE }}
  CONTAINER_NAME: ${{ vars.CONTAINER_NAME }}
  TASK_DEFINITION: cicd-basic-lab/.aws/task-definition.json

jobs:

  ci:
    name: CI — Build & Push to ECR
    runs-on: ubuntu-latest

    outputs:
      image-uri: ${{ steps.build-push.outputs.image-uri }}
      image-tag: ${{ steps.build-push.outputs.image-tag }}

    steps:
      # 1. 코드 체크아웃
      - name: Checkout
        uses: actions/checkout@v4

      # 2. JDK 설정
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # 3. Maven 빌드
      - name: Build with Maven
        working-directory: cicd-basic-lab
        run: mvn clean package -DskipTests -B

      # 4. OIDC 인증
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-cicd-basic-lab-role
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-CI-${{ github.run_id }}

      # 5. ECR 로그인
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 6. Docker 빌드 + ECR Push
      #    working-directory 스텝에서 GITHUB_OUTPUT에 직접 쓰면
      #    Runner가 outputs를 정상 인식하지 못하는 문제 있음
      #    → GITHUB_ENV로 다음 스텝에 전달
      - name: Build, tag and push image to ECR
        working-directory: cicd-basic-lab
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          TAG="${{ github.run_number }}-${SHORT_SHA}"
          IMAGE_URI="${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:${TAG}"

          echo "빌드 이미지: ${IMAGE_URI}"

          docker build \
            --build-arg BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --build-arg GIT_SHA="${SHORT_SHA}" \
            -t ${IMAGE_URI} .

          docker push ${IMAGE_URI}

          echo "IMAGE_URI=${IMAGE_URI}" >> $GITHUB_ENV
          echo "IMAGE_TAG=${TAG}"       >> $GITHUB_ENV

      # 7. outputs 저장
      #    working-directory 없이 실행해야 GITHUB_OUTPUT 정상 동작
      - name: Export image outputs
        id: build-push
        run: |
          echo "image-uri<<EOF" >> $GITHUB_OUTPUT
          echo "${IMAGE_URI}"   >> $GITHUB_OUTPUT
          echo "EOF"            >> $GITHUB_OUTPUT
          echo "image-tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "확인 - image-uri: ${IMAGE_URI}"


  cd:
    name: CD — Deploy to ECS
    runs-on: ubuntu-latest
    needs: ci

    steps:
      # 1. 코드 체크아웃
      - name: Checkout
        uses: actions/checkout@v4

      # 2. OIDC 인증
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-cicd-basic-lab-role
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-CD-${{ github.run_id }}

      # 3. Task Definition ACCOUNT_ID 치환
      - name: Inject Account ID into task definition
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          TASK_DEF_PATH=$(find $GITHUB_WORKSPACE -name "task-definition.json" | head -1)
          echo "찾은 경로: ${TASK_DEF_PATH}"
          sed -i "s/ACCOUNT_ID/${ACCOUNT_ID}/g" ${TASK_DEF_PATH}
          echo "Task Definition ACCOUNT_ID 치환 완료: ${ACCOUNT_ID}"

      - name: Debug ci outputs
        run: |
          echo "needs.ci.outputs.image-uri = ${{ needs.ci.outputs.image-uri }}"
          echo "needs.ci.outputs.image-tag = ${{ needs.ci.outputs.image-tag }}"
      
      # 4. Task Definition 이미지 URI 교체
      - name: Render new task definition with updated image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.TASK_DEFINITION }}
          container-name:  ${{ env.CONTAINER_NAME }}
          image:           ${{ needs.ci.outputs.image-uri }}

      # 5. ECS Rolling Update 배포
      - name: Deploy to ECS (Rolling Update)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service:  ${{ env.ECS_SERVICE }}
          cluster:  ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      # 6. 배포 결과 출력
      - name: Print deployment result
        run: |
          echo "=============================="
          echo " 배포 완료"
          echo " 이미지: ${{ needs.ci.outputs.image-uri }}"
          echo " 클러스터: ${{ env.ECS_CLUSTER }}"
          echo " 서비스: ${{ env.ECS_SERVICE }}"
          echo "=============================="
